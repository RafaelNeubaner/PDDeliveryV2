<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Delivery V2</title>
    <link rel="icon" href="assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/adm/css/adm.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
     <script src="/js/requiredAdmin.js" type="module"></script>
    <script src="/adm/js/adm.js" type="module" defer></script>
    
  </head>
<body>
  <!-- HEADER -->
    <header>
      <a class="navbar-brand d-block" href="/index.html">
              <img
                src="/assets/media/logo/Logo.png"
                alt="PD Delivery V2"
                id="logoMobile"
              />
        </a>
      <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand d-block" href="/index.html">
              <img
                src="/assets/media/logo/Logo.png"
                alt="PD Delivery V2"
                id="logo"
              />
        </a>
        <p class="navLink active">Gerenciar Pedidos</p>
        <p class="navLink">Gerenciar Produtos</p>
      </nav>
    </header>
    <main>
      <section id="gerenciarPedidos" class="visible">
        <h2 class="title">Gerenciar Pedidos</h2>
      </section>
      <section id="gerenciarProdutos" class="hidden">
        <h2 class="title">Gerenciar Produtos</h2>
        <div class="searchProdutos">
          <div class="containerInput">
            <input type="search" placeholder="Busca"/>
            <i class="bi bi-search"></i>
          </div>
          <button class="btnPrimary">Criar Produto</button>
        </div>
        <div class="produtosContainer">
          <template class="cardProdutoTemp">
            <article class="cardProdutoAdm">
              <img src="https://s2-casaejardim.glbimg.com/W1fPyFbY1VJ1LZrOLa6-cwgVD10=/0x0:1400x933/924x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_a0b7e59562ef42049f4e191fe476fe7d/internal_photos/bs/2024/k/g/fQetnlRqCCgARUUVXwXQ/receita-pao-queijo-carne-louca-acem-mococa.jpg" alt="">
              <div class="contentText">
                <h4 class="titleProduto">Pão de Queijo Recheado com Lombo</h4>
                <span class="priceProduto">R$24,50</span>
              </div>
              <div class="buttons">
                <i class="bi bi-eye"></i>
                <button class="btnSecondaryOutline">Editar</button>
                <button class="btnPrimary">Excluir</button>
              </div>
            </article>
          </template>
        </div>
      </section>
    </main>
    <footer>
      <p class="textCenter copy">&copy; 2024 PD Delivery V2. Todos os direitos reservados.</p>
      <div class="navLinks">
        <p class="navLink active">Gerenciar Pedidos</p>
        <p class="navLink">Gerenciar Produtos</p>
      </div>
    </footer>
</body>
</html>
