<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Delivery V2</title>
    <link rel="icon" href="assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/adm/css/adm.css" />
    <link rel="stylesheet" href="/adm/css/gerenciarPedidos.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
     <script src="/js/requiredAdmin.js" type="module"></script>
    <script src="/adm/js/adm.js" type="module" defer></script>
    <script type="module" src="js/gerenciar_pedidos.js"></script>
    
  </head>
<body>
  <!-- HEADER -->
    <header>
      <img
        src="/assets/media/logo/Logo.png"
        alt="PD Delivery V2"
        id="logoMobile"
      />

      <span class="logoutBtnMobile d-flex d-lg-none align-items-center gap-2">
        <i class="bi bi-box-arrow-left"></i>
        Logout
      </span>
      <nav class="navbar navbar-expand-lg">
        <div>
          <img
            src="/assets/media/logo/Logo.png"
            alt="PD Delivery V2"
            id="logo"
          />
          <p class="navLink active">Gerenciar Pedidos</p>
          <p class="navLink">Gerenciar Produtos</p>
        </div>
        <span class="logoutButton">
          <i class="bi bi-box-arrow-left"></i>
          <span>Logout</span>
        </span>
      </nav>
    </header>
    <main>
      <section id="gerenciarPedidos" class="visible">
        <div class="title">
          <h2 class="title">Gerenciar Pedidos</h2>
          <button class="btnPrimary btnAtualizarPagina">Atualizar</button>
        </div>
        <section class="statusOptionsSec"></section>
        <section class="pedidosSec">
          <template class="cardPedidoTemp">

            <article class="cardPedido">
              <div  class="dadosPedidos">
                
                <img src="https://s2-receitas.glbimg.com/X4ml6XBTOVnqH8KW57eBfGBs-Oc=/0x0:984x648/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_1f540e0b94d8437dbbc39d567a1dee68/internal_photos/bs/2022/Q/B/BHy7kUR0CN7EiUaccsZQ/picanha-no-espeto.jpg">
              <div>
                <h4>Pedido: #<span class="idPedido">321</span></h4>
                <h4 class="tempoPedido"></h4>
                <h4>Total: <span class="precoPedido"></span></h4>
                <h4>Nome: <span class="nomeCliente"></span></h4>
              </div>
            </div>
            <div class="actions">
              <span class="badgeStatusPedido"></span>
              <button class="btnSecondaryOutline hide secondaryBtnCardPedido">Recusar</button>
              <button class="btnPrimary primaryBtnCardPedido">Aceitar</button>
            </div>
          </article>
        </template>
        </section>
      </section>
      <section id="gerenciarProdutos" class="hidden">
        <h2 class="title">Gerenciar Produtos</h2>
        <div class="searchProdutos">
          <div class="containerInput">
            <input id="searchInput" type="search" placeholder="Busca"/>
            <i class="bi bi-search"></i>
          </div>
          <button class="btnPrimary" id="btnCriarProduto">Criar Produto</button>
        </div>
        <div class="produtosContainer">
          <template class="cardProdutoTemp">
            <article class="cardProdutoAdm">
              <div class="produtoDetails">
                <img src="https://s2-casaejardim.glbimg.com/W1fPyFbY1VJ1LZrOLa6-cwgVD10=/0x0:1400x933/924x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_a0b7e59562ef42049f4e191fe476fe7d/internal_photos/bs/2024/k/g/fQetnlRqCCgARUUVXwXQ/receita-pao-queijo-carne-louca-acem-mococa.jpg" alt="">
                <div class="contentText">
                  <h4 class="titleProduto">Pão de Queijo Recheado com Lombo</h4>
                  <span class="priceProduto">R$24,50</span>
                </div>
              </div>
              <div class="buttons">

                <button class="btnSecondaryOutline btnEditar">Editar</button>
                <button class="btnPrimary btnExcluir">Excluir</button>
              </div>
            </article>
          </template>
        </div>
      </section>
    </main>

    <footer>
      <div>
        <i class="bi bi-list-check selected" data-to="pedidos"></i>
        <span>Pedidos</span>
      </div>
      <div>
        <i class="bi bi-archive-fill" data-to="produtos"></i>
        <span>Produtos</span>
      </div>
    </footer>

    <!-- MODAL CRIAR / EDITAR PRODUTO -->
    <div class="modalOverlay" id="modalProduto">
      <div class="modalContent">
        <button type="button" class="btnFecharModal" id="btnFecharModal" title="Fechar">
          <i class="bi bi-x-lg"></i>
        </button>
        <form id="formProduto" autocomplete="off">
          <!-- Imagem URL -->
          <div class="modalFormRow modalFormRowImage">
            <div class="inputImageUrl">
              <i class="bi bi-image"></i>
              <input type="text" id="produtoImage" placeholder="Imagem URL" />
            </div>
            <button type="button" class="btnImagePreview" id="btnImagePreview" title="Pré-visualizar imagem">
              <i class="bi bi-card-image"></i>
            </button>
          </div>

          <!-- Preview da imagem -->
          <div class="imagePreviewContainer" id="imagePreviewContainer">
            <img id="imagePreview" src="" alt="Pré-visualização" />
          </div>

          <!-- Nome e Categoria -->
          <div class="modalFormRow">
            <input type="text" id="produtoNome" placeholder="Nome" required />
            <input type="text" id="produtoCategoria" placeholder="Categoria" />
          </div>

          <!-- Preço e Desconto -->
          <div class="modalFormRow">
            <input type="number" id="produtoPreco" placeholder="Preço" step="0.01" min="0" required />
            <input type="number" id="produtoDesconto" placeholder="Desconto" step="0.01" min="0" />
          </div>

          <!-- Descrição -->
          <div class="modalFormRow">
            <textarea id="produtoDescricao" placeholder="Descrição" rows="4"></textarea>
          </div>

          <!-- Seção Opcionais -->
          <fieldset class="opcionaisFieldset">
            <legend>Opcionais</legend>

            <div class="opcionaisAddRow">
              <input type="text" id="novoTipoAdicional" placeholder="Tipo adicional" />
              <button type="button" class="btnPrimary btnSmall" id="btnAddTipoAdicional">Adicionar</button>
            </div>

            <div id="opcionaisContainer"></div>
          </fieldset>

          <!-- Botões do Modal -->
          <div class="modalActions">
            <button type="button" class="btnSecondaryOutline" id="btnVoltarProduto">Voltar</button>
            <button type="submit" class="btnPrimary" id="btnSubmitProduto">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- TEMPLATE GRUPO OPCIONAL -->
    <template id="templateGrupoOpcional">
      <div class="grupoOpcional">
        <div class="grupoOpcionalHeader">
          <button type="button" class="grupoToggleBtn">
            <i class="bi bi-chevron-down"></i>
            <span class="grupoNome">Molhos</span>
          </button>
          <div class="grupoToggles">
            <label class="toggleLabel">
              <span>Multi Seleção</span>
              <input type="checkbox" class="toggleMultiSelecao" />
              <span class="toggleSwitch"></span>
            </label>
            <label class="toggleLabel">
              <span>Obrigatório</span>
              <input type="checkbox" class="toggleObrigatorio" />
              <span class="toggleSwitch"></span>
            </label>
            <span class="grupoOpcaoCount">0 opções</span>
            <button type="button" class="link btnAddOpcao btnPrimaryOutline">Adicionar</button>
            <button type="button" class="btnRemoveGrupo" title="Remover grupo">
              <i class="bi bi-trash-fill"></i>
            </button>
          </div>
        </div>
        <div class="grupoOpcionalBody">
          <table class="opcoesTable">
            <tbody></tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- TEMPLATE LINHA OPÇÃO -->
    <template id="templateOpcaoRow">
      <tr class="opcaoRow">
        <td class="opcaoIndex">1</td>
        <td><input type="text" class="opcaoImagem" placeholder="URL Imagem" /></td>
        <td><input type="text" class="opcaoNome" placeholder="Nome" /></td>
        <td><input type="text" class="opcaoDescricao" placeholder="Descrição" /></td>
        <td><input type="text" class="opcaoPreco" placeholder="R$ 0,00" /></td>
        <td class="opcaoActions">
          <button type="button" class="btnOpcaoConfirmar" title="Confirmar"><i class="bi bi-check-lg"></i></button>
          <button type="button" class="btnOpcaoEditar" title="Editar"><i class="bi bi-pencil-fill"></i></button>
          <button type="button" class="btnOpcaoExcluir" title="Excluir"><i class="bi bi-trash-fill"></i></button>
        </td>
      </tr>
    </template>

    <!-- MODAL EXCLUIR PRODUTO -->
    <div class="modalOverlay" id="modalExcluir">
      <div class="modalContentExcluir">
        <h3>Deseja realmente excluir o produto selecionado?</h3>
        <p class="modalExcluirSub">Essa ação não poderá ser desfeita e todos os dados serão excluídos</p>
        <div class="modalActions">
          <button type="button" class="btnSecondaryOutline" id="btnCancelarExcluir">Cancelar</button>
          <button type="button" class="btnPrimary" id="btnConfirmarExcluir">Confirmar</button>
        </div>
      </div>
    </div>

    <!-- TOAST DE SUCESSO -->
    <div class="toastContainer" id="toastContainer">
      <div class="toastMessage" id="toastMessage">
        <i class="bi bi-check-circle-fill"></i>
        <span id="toastText"></span>
      </div>
    </div>
    
    <div class="loading hide">
      <div class="spinner-content">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
</body>
</html>
