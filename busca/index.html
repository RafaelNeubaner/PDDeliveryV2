<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Delivery V2</title>
    <link rel="icon" href="/assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/busca/css/busca.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script type="module" src="/js/requiredAuthentication.js"></script>
    <script src="/js/scripts.js" defer></script>
    <script type="module" src="/js/components/header.js"></script>
    <script type="module" src="/js/components/productCard.js"></script>
    <script type="module" src="/busca/js/busca.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <nav class="navbar navbar-expand-lg">
        <search class="containerSearch">
          <a class="navbar-brand d-block" href="/index.html">
            <img
              src="/assets/media/logo/Logo.png"
              alt="PD Delivery V2"
              id="logo"
            />
          </a>

          <form
            action="/busca/index.html"
            class="d-flex position-relative inputForm"
          >
            <input
              type="text"
              name="query"
              class="form-control pe-5"
              placeholder="O que você está procurando?"
              aria-label="Pesquisar produtos"
            />
            <button class="btn" type="submit" id="button-search-desktop">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <ul class="navbar-nav align-items-center">
            <li class="nav-item d-block">
              <a href="/pedidos/index.html" class="nav-link"
                ><i class="bi bi-box-seam"></i
              ></a>
            </li>

            <li class="nav-item position-relative">
              <a href="/carrinho/index.html" class="nav-link"
                ><i class="bi bi-cart3"></i
              ></a>
              <span class="cart-badge">0</span>
            </li>

              <li class="nav-item d-block iconProfile">
                <a href="/perfil/perfil.html" class="nav-link"
                  ><i class="bi bi-person"></i
                ></a>
              </li>

              <li class="nav-item d-block logoutLink">
                <a
                  href="/index.html"
                  class="btn nav-link logoutBtn"
                  style="
                    cursor: pointer;
                    border: none;
                    background: none;
                    padding: 0.5rem 0.75rem;
                    "
                >
                  <i class="bi bi-box-arrow-right"></i>
                </a>
              </li>
            </ul>
          </search>
      </nav>
    </header>

    <main>
      <section class="filtros">
        <ul>
          <li class="btnPrimaryOutline promocao" data-filter="promocao">Promoções</li>
          <li class="btnPrimaryOutline sobremesa" data-filter="sobremesa">Sobremesas</li>
          <li class="btnPrimaryOutline bebidas" data-filter="bebidas">Bebidas</li>
          <li class="btnPrimaryOutline brasileira" data-filter="brasileira">Tradicional Brasileira</li>
        </ul>

        <label class="ordenarBusca">
          <span>Ordenar por</span>
          <select id="ordenarBusca" name="ordenar">
            <option value="" disabled selected>Selecione um filtro</option>
            <option value="maior-preco">Maior preço</option>
            <option value="menor-preco">Menor preço</option>
            <option value="maior-desconto">Maior desconto</option>
            <option value="alfabetica">Alfabética</option>
          </select>
        </label>
      </section>
    <div class="container mt-5 p-0  ContainerBusca">
        <section class="col-lg-9" id="resultadosBusca">
          <div
            id="gridProdutosBusca"
            class="row containerCardapio row"
          >

            <div class="col-12 text-center py-5 w-100" id="loadingBusca">
              <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Carregando produtos...</span>
              </div>
            </div>
          </div>
        </section>
    </div>
    </main>

    <footer>
      <p class="textCenter">
        © PD Delivery V2 2026 | Desenvolvido por Pablo, Pedro e Rafael.
      </p>
    </footer>
  </body>
</html>
