<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produto | PD Delivery V2</title>
    <link rel="icon" href="/assets/media/icons/fav-icon.png" type="image/png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/detalhes-produto/css/detalhes-produto.css" />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/requiredAuthentication.js"></script>
    <script src="/js/scripts.js" defer></script>
    <script type="module" src="/js/components/header.js"></script>
    <script type="module" src="/detalhes-produto/js/detalhes-produto.js"></script>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg">
        <search class="containerSearch">
          <a class="navbar-brand d-block" href="/index.html">
            <img
              src="/assets/media/logo/Logo.png"
              alt="PD Delivery V2"
              id="logo"
            />
          </a>

          <form
            action="/busca/index.html"
            class="d-flex position-relative inputForm"
          >
            <input
              type="text"
              name="query"
              class="form-control pe-5"
              placeholder="O que você está procurando?"
              aria-label="Pesquisar produtos"
            />
            <button class="btn" type="submit" id="button-search-desktop">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <ul class="navbar-nav align-items-center">
            <li class="nav-item d-block">
              <a href="/pedidos/index.html" class="nav-link"
                ><i class="bi bi-box-seam"></i
              ></a>
            </li>

            <li class="nav-item position-relative">
              <a href="/carrinho/index.html" class="nav-link"
                ><i class="bi bi-cart3"></i
              ></a>
              <span class="cart-badge">0</span>
            </li>

            <li class="nav-item d-block iconProfile">
              <a href="/perfil/perfil.html" class="nav-link"
                ><i class="bi bi-person"></i
              ></a>
            </li>

            <li class="nav-item d-block logoutLink">
              <a
                href="/index.html"
                class="btn nav-link logoutBtn"
                style="
                  cursor: pointer;
                  border: none;
                  background: none;
                  padding: 0.5rem 0.75rem;
                "
              >
                <i class="bi bi-box-arrow-right"></i>
              </a>
            </li>
          </ul>
        </search>
      </nav>
    </header>

    <main class="produtoPage">
      <div id="produtoLoading" class="produtoStatus">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Carregando produto...</span>
        </div>
      </div>

      <section id="produtoDetalhe" class="produtoDetalhe d-none">
        <a href="javascript:history.back()" class="voltarProduto">
          <i class="bi bi-arrow-left-circle"></i>
          <span>Voltar</span>
        </a>

        <article class="produtoImagemInfo">
          <h1 id="produtoNomeTitulo" class="title"></h1>
          <img id="produtoImagem" class="produtoImagem" src="" alt="" />
          <h2 class="title produtoNomeResumo displayNoneDesktop"></h2>
          <div id="produtoDescricao" class="produtoDescricao"></div>
          
        </article>

        <section class="produtoAdicionais">
          <div id="listaAdicionais" class="listaAdicionais"></div>
        </section>

        <aside class="produtoCompra">
          <div class="produtoBadges" id="produtoBadges"></div>
          <h2 id="produtoNomeResumo" class="cardTitle produtoNomeResumo displayNoneMobile"></h2>
          <div class="group">
          <p id="produtoPreco" class="produtoPreco"></p>
          <div class="quantidadeProduto displayNoneDesktop" aria-label="Quantidade do produto">
            <button type="button" id="diminuirProduto" aria-label="Diminuir">
              <i class="bi bi-dash"></i>
            </button>
            <span id="quantidadeProduto">1</span>
            <button type="button" id="aumentarProduto" aria-label="Aumentar">
              <i class="bi bi-plus"></i>
            </button>
          </div>
          </div>
          <button type="button" id="comprarAgora" class="btnPrimary btnComprar">
            Comprar agora
          </button>

          <button type="button" id="adicionarCarrinho" class="btnPrimaryOutline btnAdicionar">
            <span>Adicionar</span>
            <span id="totalPedido">R$ 0,00</span>
          </button>
        </aside>
      </section>

      <section id="produtoErro" class="produtoStatus d-none">
        <h1 class="title">Produto não encontrado</h1>
        <p>Não foi possível carregar os detalhes desse produto.</p>
        <a href="/index.html" class="btnPrimary">Voltar ao início</a>
      </section>
    </main>

    <footer class="d-none d-lg-block">
      <p class="textCenter">
        © PD Delivery V2 2026 | Desenvolvido por Pablo, Pedro e Rafael.
      </p>
    </footer>
  </body>
</html>
