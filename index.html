<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Delivery V2</title>
    <link rel="icon" href="assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/home.css" />

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <!-- <script type="module" src="./js/requiredAuthentication.js"></script> -->
    <script src="js/scripts.js" defer></script>
    
  </head>
<body>
  <!-- HEADER -->
    <header>
      <nav class="navbar navbar-expand-lg">
        
          <search class="containerSearch">
            <a class="navbar-brand d-block" href="/index.html">
              <img
                src="/assets/media/logo/Logo.png"
                alt="PD Delivery V2"
                id="logo"
              />
            </a>

            <form
              action="/busca/busca-produto.html"
              class="d-flex position-relative inputForm"
            >
              <input
                type="text"
                name="query"
                class="form-control pe-5"
                placeholder="Buscar..."
                aria-label="Pesquisar produtos"
              />
              <button class="btn" type="submit" id="button-search-desktop">
                <i class="bi bi-search"></i>
              </button>
            </form>

            <ul class="navbar-nav align-items-center">

              <li class= "nav-item d-block">
                <a href="/pedidos/index.html" class="nav-link"
                  ><i class="bi bi-box-seam"></i
                ></a>
              </li>

              <li class="nav-item position-relative">
                <a href="/carrinho/index.html" class="nav-link"
                  ><i class="bi bi-cart3"></i
                ></a>
                <span class="cart-badge">0</span>
              </li>

              <li class="nav-item d-block iconProfile">
                <a href="/adm/index.html" class="nav-link"
                  ><i class="bi bi-person"></i
                ></a>
              </li>

              <li class="nav-item d-block logoutLink">
                <a
                  href="/index.html"
                  class="btn nav-link logoutBtn"
                  style="
                    cursor: pointer;
                    border: none;
                    background: none;
                    padding: 0.5rem 0.75rem;
                    "
                >
                  <i class="bi bi-box-arrow-right"></i>
                </a>
              </li>
            </ul>
          </search>
      </nav>
    </header>

    <main>

    <!-- HERO -->
    <section id="hero" class="container-fluid mx-auto">
      <section class="carrossel-wrap">
        <input type="radio" name="carrossel" id="r1" class="carrossel-radio" />
        <input type="radio" name="carrossel" id="r2" class="carrossel-radio" />
        <input type="radio" name="carrossel" id="r3" class="carrossel-radio" />
        <div class="carrossel">
          <div class="slides_dots">
            <div class="slides_autoplay">
              <article class="slide" id="slide1">
                <a
                  href="#"
                  aria-label="Ir para página do produto"
                >
                  <img
                    src="/assets/media/images/tela-principal/slide-01.png"
                    alt="Slide 1"
                    style="object-position: 50% 0%"
                    class="d-none d-lg-block d-sm-block"
                  />
                  <img
                    src="/assets/media/images/tela-principal/slide-01-mobile.png"
                    alt="Slide 1"
                    style="object-position: 50% 0%"
                    class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
              <article class="slide">
                <a
                  href="#"
                  aria-label="Ir para página do produto"
                >
                  <img
                    src="/assets/media/images/tela-principal/slide-02.png"
                    alt="Slide 2"
                    class="d-none d-lg-block d-sm-block"
                  />
                  <img
                    src="/assets/media/images/tela-principal/slide-02-mobile.png"
                    alt="Slide 2"
                    style="object-position: 50% 0%"
                    class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
              <article class="slide">
                <a
                  href="#"
                  aria-label="Ir para página do produto"
                >
                  <img
                    src="/assets/media/images/tela-principal/slide-03.png"
                    alt="Slide 3"
                    class="d-none d-lg-block d-sm-block"
                  />
                  <img
                    src="/assets/media/images/tela-principal/slide-03-mobile.png"
                    alt="Slide 3"
                    style="object-position: 50% 0%"
                    class="d-block d-lg-none d-sm-none"
                  />
                </a>
              </article>
            </div>
          </div>
        </div>
        <div class="dots">
          <label for="r1" class="dot" aria-label="Ir para slide 1"></label>
          <label for="r2" class="dot" aria-label="Ir para slide 2"></label>
          <label for="r3" class="dot" aria-label="Ir para slide 3"></label>
        </div>
      </section>
    </section>

    </main>
  </div>
</body>
</html>
