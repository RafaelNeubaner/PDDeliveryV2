<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Delivery V2</title>
    <link rel="icon" href="/assets/media/icons/fav-icon.png" type="image/png" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="./css/pedidos.css">

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script type="module" src="../js/requiredAuthentication.js"></script>
    <script type="module" src="../js/requiredOnlyClient.js"></script>
    <script type="module" src="../js/components/header.js"></script>
    <script type="module" src="./js/pedido.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <nav class="navbar navbar-expand-lg">
        <search class="containerSearch">
          <a class="navbar-brand d-block" href="/index.html">
            <img
              src="/assets/media/logo/Logo.png"
              alt="PD Delivery V2"
              id="logo"
            />
          </a>

          <form
            action="/busca/index.html"
            class="d-flex position-relative inputForm"
          >
            <input
              type="text"
              name="query"
              class="form-control pe-5"
              placeholder="O que você está procurando?"
              aria-label="Pesquisar produtos"
            />
            <button class="btn" type="submit" id="button-search-desktop">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <ul class="navbar-nav align-items-center">
            <li class="nav-item d-block">
              <a href="/pedidos/index.html" class="nav-link"
                ><i class="bi bi-box-seam"></i
              ></a>
            </li>

            <li class="nav-item position-relative">
              <a href="/carrinho/index.html" class="nav-link"
                ><i class="bi bi-cart3"></i
              ></a>
              <span class="cart-badge">0</span>
            </li>

              <li class="nav-item d-block iconProfile">
                <a href="/perfil/perfil.html" class="nav-link"
                  ><i class="bi bi-person"></i
                ></a>
              </li>

              <li class="nav-item d-block logoutLink">
                <a
                  href="/index.html"
                  class="btn nav-link logoutBtn"
                  style="
                    cursor: pointer;
                    border: none;
                    background: none;
                    padding: 0.5rem 0.75rem;
                    "
                >
                  <i class="bi bi-box-arrow-right"></i>
                </a>
              </li>
            </ul>
          </search>
      </nav>
    </header>

    <main>
        <div class="title">
            <h3>Detalhes do Pedido</h3>
            <button class="btnRetornarPedidos btnSecondary">Retornar aos Pedidos</button>
        </div>

        <div class="informacoesPedido">
            <p class="badgeStatusPedido  statusContent order-0 order-lg-3"></p>
            <h4>Pedido <span class="pedidoId order-1 order-lg-0"></span></h4>
            <h4>Data da Compra <span class="dataCompra order-2 order-lg-1"></span></h4>
            <h4>Total <span class="totalPedido order-3 order-lg-2"></span></h4>
        </div>

        <section class="horariosPedido">
            <div>
                <p>Pedido Realizado</p>
                <p class="pedidoRealizado"></p>
            </div>
            <div>
                <p>Pedido entregue</p>
                <p class="pedidoEntregue"></p>
            </div>
        </section>

        <section class="produtosPedidos">
            <template class="cardProdutoPedidoTemp">
                <article class="cardProdutoPedido">
                    <img src="https://s2-casaejardim.glbimg.com/W1fPyFbY1VJ1LZrOLa6-cwgVD10=/0x0:1400x933/924x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_a0b7e59562ef42049f4e191fe476fe7d/internal_photos/bs/2024/k/g/fQetnlRqCCgARUUVXwXQ/receita-pao-queijo-carne-louca-acem-mococa.jpg" alt="">
                    <div>
                        <h3>Item: <span class="produtoTitle"></span></h3>
                        <h3>Adicionais: <span class="produtoAdicionais"></span></h3>
                        <h3>Quantidade: <span class="produtoQtd"></span></h3>
                    </div>
                </article>
            </template>
        </section>

        <section class="avaliacao">
            <h2>Faça uma avaliação</h2>
            <div>
                <i class="star bi bi-star" data-value="1"></i>
                <i class="star bi bi-star" data-value="2"></i>
                <i class="star bi bi-star" data-value="3"></i>
                <i class="star bi bi-star" data-value="4"></i>
                <i class="star bi bi-star" data-value="5"></i>
            </div>
        </section>

        <section class="dadosDoPedido">
            <div>
                <h3>Endereço</h3>
                <p class="nomeCliente"></p>
                <p class="enderecoCliente"></p>
            </div>
            <div>
                <h3>Pagamento</h3>
                <p class="formaPagamento"></p>
                <p class="totalPedido"></p>
            </div>
            <div class="resumoContent">
                <h3>Resumo</h3>
                <div>
                    <p>Produtos(qtd)</p>
                    <p class="subtotal"></p>
                </div>
                <div>
                    <p>Taxa de Serviço</p>
                    <p class="taxaServiço"></p>
                </div>
                <div>
                    <p>Descontos<p>
                    <p class="descontos"></p>
                </div>
                <div>
                    <p>Frete</p>
                    <p class="frete"></p>
                </div>
                <div class="totalCont">
                    <p>Total</p>
                    <p class="totalPedido"></p>
                </div>
            </div>
        </section>
        <button class="btnComprarNovamente btnPrimary">Comprar Novamente</button>
    </main>

    <section class="acessoNegado hide">
      <i class="bi bi-ban"></i>
      <h3>Você não tem acesso a esse pedido</h3>
    </section>
    
    <div class="loading">
      <div class="spinner-content">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </body>
</html>
